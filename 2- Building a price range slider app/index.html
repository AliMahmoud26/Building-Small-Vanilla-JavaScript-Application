<html>
<head>
    <link rel="stylesheet" href="style.css">
    <title>Price Range Slider</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Price Range Slider App" />
</head>
<body>
    <div class="main">
        <div class="custom-wrapper">
            <div class="header">
                <h2 class="project_title">Price Range Slider</h2>
            </div>
            <div class="price-input-container">
                <div class="price-input">
                    <div class="price-field">
                        <span>Minimum Price</span>
                        <input type="number" class="min-input" value="2500">
                    </div>
                    <div class="price-field">
                        <span>Maximum Price</span>
                        <input type="number" class="max-input" value="7500">
                    </div>
                </div>
                <div class="slider">
                    <div class="price-slider"></div>
                </div>
            </div>

            <!-- Slider -->
             <div class="range-input">
                <input type="range" min="0" max="10000" value="2500" class="min-range" step="1">
                <input type="range" min="0" max="10000" value="7500" class="max-range" step="1">
             </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
